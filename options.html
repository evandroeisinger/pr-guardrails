<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PR Merge Guardrails — Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2328;
        --muted: #59636e;
        --border: #d0d7de;
        --accent: #0969da;
        --surface: #f6f8fa;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --fg: #e6edf3;
          --muted: #8d96a0;
          --border: #30363d;
          --accent: #4493f8;
          --surface: #161b22;
        }
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .wrap { max-width: 520px; margin: 0 auto; padding: 32px 24px; }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 24px; }
      section {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 20px;
        margin-bottom: 12px;
        background: var(--surface);
      }
      h2 { font-size: 14px; font-weight: 600; margin: 0 0 10px; }
      label.row {
        display: flex; align-items: center; gap: 10px;
        padding: 4px 0; cursor: pointer;
      }
      .days { display: flex; flex-wrap: wrap; gap: 6px; }
      .days label {
        padding: 6px 12px; border: 1px solid var(--border);
        border-radius: 999px; cursor: pointer; user-select: none;
        font-size: 13px;
      }
      .days input { display: none; }
      .days label:has(input:checked) {
        background: var(--accent); border-color: var(--accent); color: white;
      }
      .status { font-size: 13px; color: #1a7f37; margin-left: 8px; }
      @media (prefers-color-scheme: dark) { .status { color: #3fb950; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PR Merge Guardrails</h1>

      <section>
        <h2>Block merging on these days</h2>
        <div class="days" id="days"></div>
      </section>

      <section>
        <label class="row">
          <input type="checkbox" id="warnOnOthersPR" />
          <span>Also block merging PRs I didn't open</span>
        </label>
      </section>

      <span class="status" id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
